name: CI

on:
  push:
  pull_request:

jobs:
  release-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            miniapp/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install admin dependencies
        run: npm ci

      - name: Install miniapp dependencies
        run: npm --prefix miniapp ci

      - name: Audit dependencies
        run: npm run audit:security

      - name: Build admin
        run: npm run build:admin

      - name: Build miniapp
        run: npm --prefix miniapp run build:weapp

      - name: Test Java backend
        run: mvn test -f server-java/pom.xml

      - name: Run miniapp smoke checklist
        run: npm --prefix miniapp run smoke:checklist
