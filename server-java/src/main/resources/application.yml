spring:
  application:
    name: kinecho-server
  profiles:
    default: local
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.kinecho.server.entity
  global-config:
    db-config:
      id-type: auto

kinecho:
  zone-id: Asia/Shanghai
  project-root: .
  server-dir: server
  upload-dir: server/uploads
  ai-audio-dir: server/uploads/ai-audio
  ai-voice-upload-dir: server/uploads/ai-voice
  seed-demo-data: ${KINECHO_SEED_DEMO_DATA:false}
  api-token-enabled: ${KINECHO_API_TOKEN_ENABLED:false}
  api-token: ${KINECHO_API_TOKEN:}
  demo-login-password: ${KINECHO_DEMO_LOGIN_PASSWORD:}
  service-username: ${KINECHO_SERVICE_USERNAME:service}
  service-password: ${KINECHO_SERVICE_PASSWORD:123456}
  service-family-id: ${KINECHO_SERVICE_FAMILY_ID:family_001}
  service-display-name: 服务专员
  admin-username: ${KINECHO_ADMIN_USERNAME:admin}
  admin-password: ${KINECHO_ADMIN_PASSWORD:123456}
  wechat-app-id: ${KINECHO_WECHAT_APP_ID:}
  wechat-app-secret: ${KINECHO_WECHAT_APP_SECRET:}
  service-wechat-openid: ${KINECHO_SERVICE_WECHAT_OPENID:}
  admin-display-name: 平台管理员
  ai-chat-provider: bailian
  ai-audio-retention-count: 32

  redis-enabled: false
  redis-host: 127.0.0.1
  redis-port: 6379
  redis-password: ''
  redis-database: 0
  redis-default-ttl-seconds: 300

  bailian-api-base-url: https://dashscope.aliyuncs.com/api/v1
  bailian-compatible-base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  bailian-system-prompt: '你是 KinEcho 的温和中文陪伴助手。请简短、自然、可靠地回应老人，避免诊断医疗问题，必要时提醒联系家属或专业人员。'

  bailian-asr-model: paraformer-v2
  bailian-asr-language-hints:
    - zh
    - en
  bailian-asr-file-base-url: ${KINECHO_BAILIAN_ASR_FILE_BASE_URL:}
  bailian-asr-timeout-seconds: 90
  bailian-asr-poll-interval-millis: 800

  bailian-chat-model: ${KINECHO_BAILIAN_CHAT_MODEL:qwen-turbo}
  bailian-chat-temperature: ${KINECHO_BAILIAN_CHAT_TEMPERATURE:0.7}
  bailian-chat-max-tokens: ${KINECHO_BAILIAN_CHAT_MAX_TOKENS:240}
  bailian-chat-timeout-seconds: ${KINECHO_BAILIAN_CHAT_TIMEOUT_SECONDS:10}

  bailian-tts-model: qwen3-tts-flash
  bailian-tts-voice: Serena
  bailian-tts-language-type: Chinese
  bailian-tts-file-extension: wav
  bailian-tts-timeout-seconds: 4
